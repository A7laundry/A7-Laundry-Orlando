        <div style="font-size:140px;font-weight:900;color:#fff;line-height:.85;letter-spacing:-6px"><sup style="font-size:56px;vertical-align:top;margin-top:24px;letter-spacing:0">$</sup>37</div>

<!-- ================================================================ -->
<script>
  const creatives = [
    { id:0, name:'Split Layout',    type:'Feed',  size:'1080×1080', w:1080, h:1080, hook:'"Clean comforter. Free pickup." — foto sem overlay' },
    { id:1, name:'Full Photo + Bar',type:'Feed',  size:'1080×1080', w:1080, h:1080, hook:'"Professional cleaning" — foto full, barra branca' },
    { id:2, name:'Tipografico',     type:'Feed',  size:'1080×1080', w:1080, h:1080, hook:'"Comforter Cleaning." — tabela de precos' },
    { id:3, name:'Question',        type:'Feed',  size:'1080×1080', w:1080, h:1080, hook:'"When did you last wash your comforter?"' },
    { id:4, name:'Social Proof',    type:'Feed',  size:'1080×1080', w:1080, h:1080, hook:'"Picked up Thursday. Back Friday. Spotless."' },
    { id:5, name:'Story Split',     type:'Story', size:'1080×1920', w:1080, h:1920, hook:'"Fresh. Clean. Delivered." — foto topo limpa' },
    { id:6, name:'Story Bold',      type:'Story', size:'1080×1920', w:1080, h:1920, hook:'"Your comforter cleaned." — $37 destaque' },
  ];

  const captions = [
    { primary:"Clean comforter starting at $33. Free pickup & delivery in Orlando — we come to you, return in 24–48h. No subscriptions, no commitments. Just clean bedding.", headline:"Clean Comforter. Free Pickup. Starting at $33 | A7 Laundry Orlando", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #OrlandoFL #FreePickup #CleanBedding #BeddingService #WinterPark #Kissimmee #SleepClean" },
    { primary:"Professional comforter cleaning in Orlando. We pick up at your door and return fresh in 24–48 hours. Full/Queen $37. No subscriptions required.", headline:"Professional Comforter Cleaning | Free Pickup Orlando | $37", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #OrlandoFL #FreePickup #BeddingCleaning #CleanHome #WinterPark #LaundryService #SleepBetter" },
    { primary:"Twin $33 · Full/Queen $37 · King $40 · Down $45. Free pickup & delivery in Orlando. Back in 24–48 hours. 4.9 stars, 2,000+ families. No contracts.", headline:"Comforter Cleaning Prices | Free Pickup Orlando | A7 Laundry", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #OrlandoFL #FreePickup #BeddingCleaning #LaundryPrices #WinterPark #Kissimmee #CleanBedding" },
    { primary:"When did you last deep clean your comforter? Dust mites, bacteria, allergens — all building up while you sleep. Starting at $33 with free pickup & delivery in Orlando.", headline:"When Did You Last Wash Your Comforter? | A7 Laundry Orlando", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #DustMites #Allergens #CleanBedding #OrlandoFL #FreePickup #HealthyHome #SleepClean" },
    { primary:"'Picked up Thursday. Back Friday. Spotless.' — Jessica M., Winter Park. 4.9 stars, 2,000+ Orlando families. Comforter cleaning from $33 with free pickup & delivery.", headline:"4.9 Stars | 2,000+ Orlando Families | Comforter Cleaning | A7 Laundry", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #CustomerReview #SocialProof #OrlandoFL #WinterPark #FreePickup #CleanBedding #Verified" },
    { primary:"Fresh. Clean. Delivered. Professional comforter cleaning in Orlando. Free pickup & delivery — we come to you. Twin $33 · Queen $37 · King $40. Book in 60 seconds.", headline:"Fresh. Clean. Delivered. | Comforter Cleaning Orlando | Free Pickup", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #OrlandoFL #FreePickup #CleanBedding #BeddingService #WinterPark #Kissimmee #SleepFresh" },
    { primary:"Your comforter cleaned, picked up and delivered — starting at $37 for Full/Queen. Free pickup in Orlando. 24–48h turnaround. Book at a7laundry.com/comforter.", headline:"Comforter Cleaning $37 | Free Pickup & Delivery | Orlando", hashtags:"#ComforterCleaning #OrlandoCleaning #A7Laundry #OrlandoFL #FreePickup #BeddingCleaning #CleanComforter #WinterPark #LaundryService #SleepClean" },
  ];

  const galleryGrid = document.getElementById('galleryGrid');
  const gallery = document.getElementById('gallery');
  const singleView = document.getElementById('singleView');
  const creativeFrame = document.getElementById('creativeFrame');
  const singleCaption = document.getElementById('singleCaption');
  const sizeInfo = document.getElementById('sizeInfo');
  const tabs = document.querySelectorAll('.ui-tab[data-index]');

  creatives.forEach((c, i) => {
    const thumbClass = c.type === 'Story' ? 'story' : '';
    const badgeClass = c.type === 'Feed' ? 'badge-feed' : 'badge-story';
    const tpl = document.getElementById('tpl-' + i);
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.onclick = () => showSingle(i);
    card.innerHTML = `
      <div class="gallery-thumb ${thumbClass}">${tpl.innerHTML}</div>
      <div class="gallery-card-info">
        <h3>${String(i+1).padStart(2,'0')}. ${c.name}</h3>
        <p>${c.hook}</p>
        <span class="gallery-card-badge ${badgeClass}">${c.type} · ${c.size}</span>
      </div>
    `;
    galleryGrid.appendChild(card);
  });

  function showGallery() {
    gallery.classList.remove('hidden');
    singleView.classList.remove('active');
    singleCaption.style.display = 'none';
    sizeInfo.textContent = '7 creatives';
    tabs.forEach(t => t.classList.remove('active'));
    document.querySelector('.ui-tab:not([data-index])').classList.add('active');
  }

  function showSingle(index) {
    const c = creatives[index];
    const cap = captions[index];
    const tpl = document.getElementById('tpl-' + index);
    gallery.classList.add('hidden');
    singleView.classList.add('active');
    creativeFrame.innerHTML = tpl.innerHTML;
    sizeInfo.textContent = `${c.type} · ${c.size} · ${c.name}`;
    const vw = window.innerWidth - 56;
    const vh = window.innerHeight - 260;
    const scale = Math.min(vw / c.w, vh / c.h, 1);
    creativeFrame.style.transform = `scale(${scale})`;
    creativeFrame.style.transformOrigin = 'top center';
    creativeFrame.style.width = c.w + 'px';
    creativeFrame.style.height = c.h + 'px';

    singleCaption.style.display = 'block';
    const esc = (s) => s.replace(/`/g,'\\`');
    singleCaption.innerHTML = `
      <div class="caption-row"><span class="caption-label">Primary Text</span><button class="copy-btn" onclick="copyText(this,\`${esc(cap.primary)}\`)">Copy</button></div>
      <p class="caption-text">${cap.primary}</p>
      <div class="caption-row"><span class="caption-label">Headline</span><button class="copy-btn" onclick="copyText(this,\`${esc(cap.headline)}\`)">Copy</button></div>
      <p class="caption-text">${cap.headline}</p>
      <div class="caption-row"><span class="caption-label">Hashtags</span><button class="copy-btn" onclick="copyText(this,\`${esc(cap.hashtags)}\`)">Copy</button></div>
      <p class="caption-tags">${cap.hashtags}</p>
    `;
    tabs.forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`.ui-tab[data-index="${index}"]`);
    if(activeTab) activeTab.classList.add('active');
  }

  tabs.forEach(tab => tab.addEventListener('click', () => showSingle(parseInt(tab.dataset.index))));

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = '#0ea5e9';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    });
  }

  function exportTip() {
    const t = document.getElementById('exportToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }
</script>
</body>
