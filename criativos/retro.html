  /* ===== VIEWER UI ===== */
  .ui-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(254,243,199,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(69,26,3,.08);padding:16px 32px;display:flex;align-items:center;gap:20px}

  .ui-bar h1 span{color:#d97706}
  .ui-tabs{display:flex;gap:6px;overflow-x:auto;flex:1;padding:4px 0}
  .ui-tabs::-webkit-scrollbar{display:none}
  .ui-tab{padding:8px 16px;border-radius:12px;border:1px solid rgba(69,26,3,.1);background:#fffbeb;color:rgba(69,26,3,.4);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;font-family:inherit}
  .ui-tab:hover{border-color:rgba(69,26,3,.2);color:#451a03}
  .ui-tab.active{background:#d97706;border-color:#d97706;color:#fff}
  .ui-tab .tab-type{font-size:9px;opacity:.6;display:block;margin-top:2px}
  .ui-info{font-size:11px;color:rgba(69,26,3,.35);white-space:nowrap}
  .ui-export{padding:10px 20px;background:#d97706;color:#fff;border:none;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.2s}
  .ui-export:hover{background:#b45309}
  .ui-label{padding:4px 10px;background:rgba(217,119,6,.12);color:#d97706;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap}

  /* ===== GALLERY ===== */
  .gallery{padding:100px 32px 60px;max-width:1400px;margin:0 auto}
  .gallery-title{font-size:32px;font-weight:800;margin-bottom:8px;color:#451a03}
  .gallery-sub{font-size:14px;color:rgba(69,26,3,.4);margin-bottom:40px}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
  .gallery-card{cursor:pointer;border:1px solid rgba(180,120,40,.1);border-radius:12px;overflow:hidden;transition:.3s;background:#fffbeb;box-shadow:0 1px 3px rgba(69,26,3,.04)}
  .gallery-card:hover{border-color:#d97706;transform:translateY(-4px);box-shadow:0 12px 40px rgba(217,119,6,.12)}
  .gallery-thumb{width:100%;aspect-ratio:1;overflow:hidden;position:relative}
  .gallery-thumb.story{aspect-ratio:9/16}
  .gallery-thumb.gmb{aspect-ratio:4/3}
  .gallery-card-info{padding:16px}
  .gallery-card-info h3{font-size:13px;font-weight:700;margin-bottom:4px;color:#451a03}
  .gallery-card-info p{font-size:11px;color:rgba(69,26,3,.4)}
  .gallery-card-badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:9px;font-weight:700;margin-top:8px}
  .badge-feed{background:rgba(217,119,6,.12);color:#d97706}
  .badge-story{background:rgba(168,85,247,.12);color:#a855f7}
  .badge-gmb{background:rgba(34,197,94,.12);color:#16a34a}

  /* ===== SINGLE VIEW ===== */
  .single-view{display:none;padding:100px 32px 60px;min-height:100vh;align-items:center;justify-content:center;background:#fef3c7}
  .single-view.active{display:flex;flex-direction:column;gap:32px}
  .creative-frame{position:relative;box-shadow:0 8px 60px rgba(69,26,3,.12);border-radius:12px;overflow:hidden}
  .gallery.hidden{display:none}

  /* ===== CREATIVE BASE ===== */
  .creative{position:relative;overflow:hidden;font-family:'Inter',sans-serif;border-radius:12px}
  .creative *{box-sizing:border-box}
  .size-feed{width:1080px;height:1080px}
  .size-story{width:1080px;height:1920px}
  .size-gmb{width:1200px;height:900px}
  .gallery-thumb .creative{transform-origin:top left}
  .gallery-thumb .size-feed{transform:scale(calc(280/1080))}
  .gallery-thumb.story .size-story{transform:scale(calc(280/1080))}
  .gallery-thumb.gmb .size-gmb{transform:scale(calc(280/1200))}

  /* ===== RETRO DESIGN TOKENS ===== */
  .c-content{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;padding:80px}
  .c-logo{max-width:160px;height:auto;margin-bottom:auto}
  .c-logo-sm{max-width:120px;height:auto}
  .c-logo-dark{filter:none}
  .c-logo-light{filter:brightness(0) invert(1)}

  /* Typography */
  .c-hook{color:#451a03;font-weight:800;line-height:.92;letter-spacing:-2px}
  .c-hook-cream{color:#fef3c7}
  .c-sub{color:rgba(69,26,3,.5);line-height:1.5}
  .c-sub-cream{color:rgba(254,243,199,.6)}

  /* Buttons */
  .c-cta{display:inline-flex;align-items:center;gap:12px;padding:24px 48px;background:#d97706;color:#fff;border-radius:12px;font-weight:800;font-size:24px}
  .c-cta-outline{background:transparent;border:2px solid rgba(69,26,3,.15);color:#451a03;border-radius:12px}
  .c-cta-cream{background:#fef3c7;color:#451a03;border-radius:12px}

  /* Badge */
  .c-badge{display:inline-block;padding:10px 24px;background:rgba(217,119,6,.12);color:#d97706;border-radius:12px;font-size:18px;font-weight:700}
  .c-badge-dark{background:rgba(217,119,6,.2);color:#f59e0b;border-radius:12px}

  /* Coupon */
  .c-coupon{display:inline-block;padding:20px 40px;border:2px dashed #d97706;color:#d97706;background:rgba(217,119,6,.06);border-radius:12px;font-size:36px;font-weight:800;letter-spacing:6px}
  .c-coupon-cream{border-color:rgba(254,243,199,.4);color:#fef3c7;background:rgba(254,243,199,.08);border-radius:12px}

  /* Stars */
  .c-stars{color:#f59e0b;font-size:36px;letter-spacing:4px}

  /* Divider */
  .c-divider{width:60px;height:3px;background:#d97706;border-radius:2px;margin:20px 0}

  /* Footer */
  .c-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .c-url{font-size:20px;font-weight:600;color:rgba(69,26,3,.3)}
  .c-url-cream{color:rgba(254,243,199,.35)}
  .c-phone{font-size:20px;font-weight:700;color:#d97706}
  .c-phone-cream{color:rgba(254,243,199,.6)}

  /* Number watermark */
  .c-num{font-size:200px;font-weight:900;line-height:1;color:#d97706;opacity:.06;position:absolute}

  /* Steps */
  .c-step{display:flex;align-items:flex-start;gap:24px;margin-bottom:32px}
  .c-step-num{width:56px;height:56px;border-radius:12px;background:#d97706;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0}
  .c-step-text h4{font-size:28px;font-weight:800;color:#451a03;margin-bottom:4px}
  .c-step-text p{font-size:20px;color:rgba(69,26,3,.4)}

  /* Quote */
  .c-quote{font-size:28px;font-weight:500;color:rgba(69,26,3,.55);line-height:1.5;font-style:italic;padding-left:32px;border-left:3px solid #d97706}

  /* Grain texture */
  .grain::after{content:'';position:absolute;inset:0;z-index:3;opacity:.04;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}

  /* Toast */
  .export-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#fffbeb;border:1px solid rgba(69,26,3,.08);padding:16px 32px;border-radius:12px;font-size:13px;color:rgba(69,26,3,.5);z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(69,26,3,.08)}
  .export-toast.show{display:block}
  .export-toast kbd{background:#fef3c7;padding:2px 8px;border-radius:6px;font-size:12px;color:#451a03;border:1px solid rgba(69,26,3,.1)}

  /* ===== CAPTIONS ===== */
  .creative-caption{background:#fffbeb;border:1px solid rgba(180,120,40,.1);border-radius:12px;padding:24px;margin-top:16px;max-width:700px;width:100%;box-shadow:0 1px 3px rgba(69,26,3,.04)}
  .caption-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .caption-label{font-size:11px;font-weight:700;color:#d97706;text-transform:uppercase;letter-spacing:1px}
  .copy-btn{padding:4px 12px;background:#fef3c7;border:1px solid rgba(69,26,3,.08);border-radius:6px;color:rgba(69,26,3,.4);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
  .copy-btn:hover{background:rgba(217,119,6,.12);color:#d97706;border-color:rgba(217,119,6,.3)}
  .caption-text{font-size:13px;color:rgba(69,26,3,.55);line-height:1.6;margin-bottom:16px}
  .caption-text:last-child{margin-bottom:0}
  .caption-tags{font-size:12px;color:rgba(217,119,6,.5);margin-bottom:0;word-break:break-all}
</style>
</head>

  const galleryGrid = document.getElementById('galleryGrid');

  const creativeFrame = document.getElementById('creativeFrame');
  const singleCaption = document.getElementById('singleCaption');
  const sizeInfo = document.getElementById('sizeInfo');
  const tabs = document.querySelectorAll('.ui-tab[data-index]');

  creatives.forEach((c, i) => {
    const thumbClass = c.type === 'Story' ? 'story' : c.type === 'GMB' ? 'gmb' : '';
    const badgeClass = c.type === 'Feed' ? 'badge-feed' : c.type === 'Story' ? 'badge-story' : 'badge-gmb';
    const tpl = document.getElementById('tpl-' + i);
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.onclick = () => showSingle(i);
    card.innerHTML = `
      <div class="gallery-thumb ${thumbClass}">${tpl.innerHTML}</div>
      <div class="gallery-card-info">
        <h3>${String(i+1).padStart(2,'0')}. ${c.name}</h3>
        <p>${c.hook} · ${c.size}</p>
        <span class="gallery-card-badge ${badgeClass}">${c.type}</span>
      </div>
    `;
    galleryGrid.appendChild(card);
  });

  function showGallery() {
    gallery.classList.remove('hidden');
    singleView.classList.remove('active');
    singleCaption.style.display = 'none';
    sizeInfo.textContent = '12 creatives';
    tabs.forEach(t => t.classList.remove('active'));
    document.querySelector('.ui-tab:not([data-index])').classList.add('active');
  }

  function showSingle(index) {
    const c = creatives[index];
    const cap = captions[index];
    const tpl = document.getElementById('tpl-' + index);
    gallery.classList.add('hidden');
    singleView.classList.add('active');
    creativeFrame.innerHTML = tpl.innerHTML;
    sizeInfo.textContent = `${c.type} · ${c.size} · ${c.name}`;
    const vw = window.innerWidth - 64;
    const vh = window.innerHeight - 280;
    const scaleX = vw / c.w;
    const scaleY = vh / c.h;
    const scale = Math.min(scaleX, scaleY, 1);
    creativeFrame.style.transform = `scale(${scale})`;
    creativeFrame.style.width = c.w + 'px';
    creativeFrame.style.height = c.h + 'px';

    // Show caption
    singleCaption.style.display = 'block';
    singleCaption.innerHTML = `
      <div class="caption-row"><span class="caption-label">Primary Text</span><button class="copy-btn" onclick="copyText(this)">Copy</button></div>
      <p class="caption-text">${cap.primary}</p>
      <div class="caption-row"><span class="caption-label">Headline</span><button class="copy-btn" onclick="copyText(this)">Copy</button></div>
      <p class="caption-text">${cap.headline}</p>
      <div class="caption-row"><span class="caption-label">Hashtags</span><button class="copy-btn" onclick="copyText(this)">Copy</button></div>
      <p class="caption-tags">${cap.hashtags}</p>
    `;

    tabs.forEach(t => t.classList.remove('active'));
    document.querySelector('.ui-tab:not([data-index])').classList.remove('active');
    if (tabs[index]) tabs[index].classList.add('active');
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => showSingle(parseInt(tab.dataset.index)));
  });

  let currentIndex = -1;
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { showGallery(); currentIndex = -1; }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { currentIndex = Math.min(currentIndex + 1, 11); showSingle(currentIndex); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { currentIndex = Math.max(currentIndex - 1, 0); showSingle(currentIndex); }
  });

  function exportTip() {
    const toast = document.getElementById('exportToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 5000);
  }

  function copyText(btn) {
    const text = btn.closest('.caption-row').nextElementSibling.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.style.color = '#10b981';
      setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
    });
  }
